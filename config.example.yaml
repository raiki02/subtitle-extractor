server:
  addr: ":8080"

asr:
  base_url: "http://localhost:8001"
  timeout: "10m"
  language: "zh"
  model:
    name: "small"
    device: "auto"
    compute_type: "default"
    cpu_threads: 0
    workers: 1
  transcribe:
    beam_size: 5
    vad_filter: true
    initial_prompt: "以下是普通话的句子，请使用简体中文输出。"
  stream:
    enabled: true
    sample_rate: 16000
    chunk_size: 1600
    max_buffer_seconds: 30
    vad:
      threshold: 0.5
      min_speech_duration_ms: 250
      min_silence_duration_ms: 200
      speech_pad_ms: 100
      max_speech_duration_s: 30

video_summary:
  base_url: "http://localhost:8002"
  timeout: "20m"
  model:
    # Use "./models/marlin" for the local NemoStation/Marlin-2B files in this repo,
    # or "NemoStation/Marlin-2B" to load from Hugging Face.
    name: "./models/marlin"
    device: "auto"
    dtype: "bfloat16"
    compile: false
  summarize:
    max_new_tokens: 2048
    prompt: ""
    do_sample: false
    temperature: 1.0
    top_p: 1.0

whisper:
  # Used as a fallback when the Python ASR service is unavailable.
  # The service will POST multipart/form-data to: <base_url>/inference
  # Example (matching whisper.cpp server): "http://127.0.0.1:8080"
  base_url: "http://127.0.0.1:8080"
  # model_path is kept for backward compatibility but is no longer used by default.
  model_path: "./models/ggml-small.bin"
  language: "zh"
  prompt: "以下是普通话的句子，请使用简体中文输出。"

llm:
  # Set to false to skip the paragraph-formatting LLM call and return raw ASR text.
  enabled: true
  # When enabled, if the LLM is misconfigured/unreachable, the service will fall back
  # to returning raw ASR text instead of failing the whole extraction.
  fallback_to_raw_on_error: true
  # provider supports: openai, ollama, deepseek
  provider: "openai"
  model: ""
  base_url: ""
  api_key: ""
  api_key_env: "OPENAI_API_KEY"
  timeout: "2m"
  temperature: 0.2
  max_tokens: 4096

  # deepseek only. Leave empty to use the provider default path.
  path: ""

  # ollama only. Example: "5m". Leave empty to use Ollama's default.
  keep_alive: ""

  # Split long transcripts into chunks before paragraph formatting.
  chunk_runes: 8000

  prompt:
    system: |
      你是专业的中文转写稿编辑。你的任务是只对转写文本进行自然段划分和轻微格式整理。

      要求：
      1. 保留原文语义，不总结、不扩写、不改写事实。
      2. 修正明显的断句和空白、错别字问题。
      3. 按话题、语义停顿和上下文划分段落。
      4. 段落之间使用一个空行分隔。
      5. 不要添加标题、列表、Markdown 标记或解释。
    user_template: |
      请为下面的转写文本划分自然段，只返回处理后的正文：

      {{text}}
