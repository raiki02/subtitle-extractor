<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video Extractor</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      background: #0f1115;
      color: #e6e6e6;
    }
    main {
      max-width: 720px;
      margin: 32px auto;
      padding: 0 20px 40px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }
    p {
      color: #b0b8c4;
      line-height: 1.5;
      margin-top: 0;
    }
    form {
      display: grid;
      gap: 16px;
      background: #171a21;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }
    label {
      font-weight: 600;
      margin-bottom: 6px;
      display: inline-block;
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #2f3642;
      background: #0f1115;
      color: #e6e6e6;
      font-size: 14px;
      box-sizing: border-box;
    }
    .row {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    }
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    #status {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #10131a;
      min-height: 20px;
    }
    #status.error {
      color: #ff8b8b;
    }
    #status.ok {
      color: #9ee6a8;
    }
    footer {
      margin-top: 16px;
      font-size: 13px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main>
    <h1>Video Extractor</h1>
    <p>Provide a video URL, output name, and the type you want back. The server returns a downloadable file.</p>

    <form id="extract-form">
      <div>
        <label for="url">Video URL</label>
        <input id="url" name="url" type="url" placeholder="https://example.com/video" required />
      </div>
      <div class="row">
        <div>
          <label for="name">Output Name</label>
          <input id="name" name="name" type="text" placeholder="demo" required />
        </div>
        <div>
          <label for="type">Type</label>
          <select id="type" name="type" required>
            <option value="video">video (mp4)</option>
            <option value="audio">audio (mp3)</option>
            <option value="text">text (txt)</option>
            <option value="transcript">transcript (txt)</option>
            <option value="summary">summary (txt)</option>
          </select>
        </div>
      </div>
      <button id="submit" type="submit">Extract</button>
      <div id="status" role="status" aria-live="polite"></div>
    </form>

    <footer>Tip: the server also supports GET /extract with query parameters.</footer>
  </main>

  <script>
    const form = document.getElementById("extract-form");
    const status = document.getElementById("status");
    const submitButton = document.getElementById("submit");

    function setStatus(message, kind) {
      status.textContent = message;
      status.className = kind || "";
    }

    function filenameFromDisposition(disposition) {
      if (!disposition) return "";
      const match = disposition.match(/filename\*=UTF-8''([^;]+)|filename="?([^";]+)"?/i);
      if (!match) return "";
      return decodeURIComponent(match[1] || match[2] || "");
    }

    function defaultFilename(name, type) {
      if (type === "video") return `${name || "output"}.mp4`;
      if (type === "audio") return `${name || "output"}.mp3`;
      return `${name || "output"}.txt`;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const url = form.url.value.trim();
      const name = form.name.value.trim();
      const type = form.type.value.trim();

      if (!url || !name || !type) {
        setStatus("url, name, and type are required", "error");
        return;
      }

      submitButton.disabled = true;
      setStatus("Submitting request...", "");

      try {
        const response = await fetch("/extract", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, name, type })
        });

        const contentType = response.headers.get("content-type") || "";

        if (!response.ok) {
          let message = `Request failed (${response.status})`;
          if (contentType.includes("application/json")) {
            const data = await response.json();
            if (data && data.error) message = data.error;
          } else {
            const text = await response.text();
            if (text) message = text;
          }
          setStatus(message, "error");
          return;
        }

        if (contentType.includes("application/json")) {
          const data = await response.json();
          setStatus(data.error || "Unexpected JSON response", "error");
          return;
        }

        const blob = await response.blob();
        const filename = filenameFromDisposition(response.headers.get("content-disposition")) || defaultFilename(name, type);
        downloadBlob(blob, filename);
        setStatus(`Downloaded ${filename}`, "ok");
      } catch (error) {
        setStatus(error.message || "Request failed", "error");
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
