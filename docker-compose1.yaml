services:
  whisper:
    image: ghcr.io/ggml-org/whisper.cpp:main
    container_name: whisper-server
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    command:
      - /app/build/bin/server
      - -m
      - /models/ggml-small.bin
      - -l
      - zh
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    restart: unless-stopped